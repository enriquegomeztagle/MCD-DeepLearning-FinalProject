name: mcd-dl

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.serve
    ports:
      - "8010:8000"
    environment:
      - API_KEY=changeme
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "3010:3000"
    environment:
      - BACKEND_URL=backend:8000
    depends_on:
      - backend
    restart: unless-stopped